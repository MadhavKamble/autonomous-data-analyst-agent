name: backend CI

# Builds the exact local dev environment (docker-compose Postgres + pgvector,
# migrations, seed data, agent_ro) and runs the full pytest suite against it —
# including test_readonly_enforcement.py, which needs a real database it's
# allowed to provision roles on. Never touches Neon.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: adaa_admin
          POSTGRES_PASSWORD: adaa_ci_pw
          POSTGRES_DB: adaa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adaa_admin -d adaa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ADMIN_DATABASE_URL: postgresql://adaa_admin:adaa_ci_pw@localhost:5432/adaa
      AGENT_DATABASE_URL: postgresql://agent_ro:agent_ci_pw@localhost:5432/adaa
      AGENT_RO_PASSWORD: agent_ci_pw
      # RAG index built with --skip-embeddings below — no Ollama in CI, and
      # the pytest suite uses LexicalRetriever directly, not this setting.
      RETRIEVER: lexical

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: backend
        run: pip install -e '.[dev]'

      - name: Apply migrations
        run: python scripts/run_migrations.py

      - name: Seed mock data
        run: python db/seed/seed_mock_data.py

      - name: Provision agent_ro login
        run: python scripts/set_agent_password.py

      - name: Build RAG index (lexical only — no Ollama in CI)
        run: python scripts/build_rag_index.py --skip-embeddings

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: pytest
        working-directory: backend
        run: pytest -v
